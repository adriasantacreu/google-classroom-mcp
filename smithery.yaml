startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - credentialsPath
      - tokenPath
    properties:
      credentialsPath:
        type: string
        description: "Absolute path to your Google OAuth credentials JSON file (downloaded from Google Cloud Console)"
        default: "./credentials.json"
      tokenPath:
        type: string
        description: "Absolute path to the OAuth token file generated by running auth.js"
        default: "./token.json"
  commandFunction: |
    (config) => ({
      command: "node",
      args: ["/absolute/path/to/google-classroom-mcp/dist/index.js"],
      env: {
        GOOGLE_CREDENTIALS_PATH: config.credentialsPath,
        GOOGLE_TOKEN_PATH: config.tokenPath,
      }
    })
