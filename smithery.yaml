startCommand:
  type: stdio
  configSchema:
    type: object
    required:
      - serverPath
      - credentialsPath
      - tokenPath
    properties:
      serverPath:
        type: string
        description: "Absolute path to dist/index.js on your machine (e.g. /home/user/google-classroom-mcp/dist/index.js)"
      credentialsPath:
        type: string
        description: "Absolute path to your Google OAuth credentials.json file"
        default: "./credentials.json"
      tokenPath:
        type: string
        description: "Absolute path to the OAuth token.json generated by running auth.js"
        default: "./token.json"
  commandFunction: |
    (config) => ({
      command: "node",
      args: [config.serverPath],
      env: {
        GOOGLE_CREDENTIALS_PATH: config.credentialsPath,
        GOOGLE_TOKEN_PATH: config.tokenPath,
      }
    })
